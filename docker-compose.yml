version: '3.8'

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: drafter
      POSTGRES_PASSWORD: drafter
      POSTGRES_DB: drafter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U drafter']
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - '8001:8000'
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── Application ───────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    env_file:
      - .env.docker          # create from .env.example — see README
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://drafter:drafter@postgres:5432/drafter
      DIRECT_URL: postgresql://drafter:drafter@postgres:5432/drafter
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chromadb:8001
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      chromadb:
        condition: service_started

  frontend:
    build:
      context: ../drafter
      dockerfile: Dockerfile
      args:
        # Points the browser at the backend — use localhost since browser calls this directly
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
  redis_data:
